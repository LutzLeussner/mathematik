        <style>
        /* ── Design tokens (Japanese palette – matching index.html) ─────── */
        :root {
            --kiku:       #5b6e2e;
            --kiku-light: #e8edda;
            --kiku-bg:    #f3f5ec;
            --sango:      #c75c3a;
            --sango-light:#fceee9;
            --fukagawa:   #8a9da7;
            --fukagawa-light:#ecf1f4;
            --mushikuri:  #c8b55e;
            --mushikuri-light:#f7f3e2;
            --bg:         #fffcf6;
            --bg-card:    #ffffff;
            --ink:        #2c2c2c;
            --ink-soft:   #6b6560;
            --ink-muted:  #a09a92;
            --border:     #e8e4de;
            --border-light:#f0ece6;
            --radius:     24px;
            --radius-sm:  14px;
            --radius-xs:  8px;
            --shadow-sm:  0 1px 3px rgba(44,42,38,.05);
            --shadow-md:  0 4px 20px rgba(44,42,38,.07);
            --transition: .25s cubic-bezier(.4,0,.2,1);
            --serif:      'DM Serif Display', Georgia, serif;
            --sans:       'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            font-size: 17px;
            line-height: 1.7;
        }

        /* ── Header ──────────────────────────────────────────── */
        .tutor-header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 18px clamp(1.5rem,4vw,3rem);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--kiku);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--kiku);
            transition: all var(--transition);
            flex-shrink: 0;
            font-family: var(--sans);
        }
        .back-link:hover {
            background: var(--kiku);
            color: #fff;
        }
        .tutor-header h1 {
            font-family: var(--serif);
            font-size: clamp(18px, 2.5vw, 22px);
            font-weight: 400;
            letter-spacing: -.01em;
            flex: 1;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: clamp(2rem,5vw,3.5rem) clamp(1.5rem,4vw,3rem);
        }

        /* ── MathJax ────────────────────────────────────────── */
        mjx-container { overflow-x: auto; max-width: 100%; }
        .MathJax { font-size: 1.05em !important; }

        /* ── Buttons ────────────────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-xs);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            text-align: center;
            font-family: var(--sans);
        }
        .btn-primary {
            background: var(--kiku);
            color: #fff;
        }
        .btn-primary:hover {
            background: #4a5c24;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .btn-secondary {
            background: var(--mushikuri-light);
            color: #8a7a30;
            border: 1.5px solid var(--mushikuri);
        }
        .btn-secondary:hover {
            background: var(--mushikuri);
            color: #fff;
        }
        .btn-success {
            background: var(--kiku-light);
            color: var(--kiku);
            border: 1.5px solid var(--kiku);
        }
        .btn-success:hover {
            background: var(--kiku);
            color: #fff;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* ── Cards ──────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-md); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            user-select: none;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .card-icon.green { background: var(--kiku-light); color: var(--kiku); }
        .card-icon.blue { background: var(--fukagawa-light); color: var(--fukagawa); }
        .card-icon.amber { background: var(--mushikuri-light); color: #8a7a30; }
        .card-icon.red { background: var(--sango-light); color: var(--sango); }

        .card-title {
            flex: 1;
            font-family: var(--serif);
            font-size: clamp(17px, 2vw, 20px);
            font-weight: 400;
        }
        .card-subtitle {
            font-size: 14px;
            color: var(--ink-soft);
            margin-top: 4px;
        }
        .card-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 10px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
        .badge-green { background: var(--kiku-light); color: var(--kiku); }
        .badge-amber { background: var(--mushikuri-light); color: #8a7a30; }
        .badge-red { background: var(--sango-light); color: var(--sango); }

        /* ── Progress Bar ───────────────────────────────────── */
        .progress-bar {
            width: 100%;
            height: 5px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .progress-fill {
            height: 100%;
            background: var(--kiku);
            transition: width .5s;
            border-radius: 3px;
        }

        /* ── Quiz Styles ────────────────────────────────────── */
        .quiz-container { max-width: 700px; margin: 0 auto; }
        .quiz-header { text-align: center; margin-bottom: 2rem; }
        .quiz-question-counter {
            font-size: 13px;
            color: var(--ink-muted);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .quiz-question-title {
            font-family: var(--serif);
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 400;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .quiz-option {
            padding: 16px 20px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg-card);
            font-size: 16px;
            line-height: 1.6;
        }
        .quiz-option:hover {
            border-color: var(--kiku);
            background: var(--kiku-bg);
        }
        .quiz-option input[type="radio"] { margin-right: 12px; cursor: pointer; accent-color: var(--kiku); }
        .quiz-option.selected { border-color: var(--kiku); background: var(--kiku-bg); }
        .quiz-option.correct { border-color: var(--kiku); background: var(--kiku-light); }
        .quiz-option.incorrect { border-color: var(--sango); background: var(--sango-light); }

        /* ── Quiz Results ───────────────────────────────────── */
        .quiz-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin: 2rem 0;
        }
        .result-card {
            padding: 24px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .result-card.mastered { background: var(--kiku-light); border: 1.5px solid var(--kiku); }
        .result-card.unsure { background: var(--mushikuri-light); border: 1.5px solid var(--mushikuri); }
        .result-card.needs-practice { background: var(--sango-light); border: 1.5px solid var(--sango); }
        .result-card-title { font-weight: 600; margin-top: 10px; font-size: 14px; }
        .result-card-status { font-size: 1.1rem; margin-top: 6px; font-weight: 700; }
        .result-card.mastered .result-card-status { color: var(--kiku); }
        .result-card.unsure .result-card-status { color: #8a7a30; }
        .result-card.needs-practice .result-card-status { color: var(--sango); }
        .result-icon { font-size: 2.25rem; }

        /* ── Learning Path ──────────────────────────────────── */
        .learning-path { display: flex; flex-direction: column; gap: 16px; }

        .topic-card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition);
        }
        .topic-card:hover { box-shadow: var(--shadow-md); }

        .topic-card-header {
            padding: 20px 24px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-card);
            transition: background var(--transition);
        }
        .topic-card-header:hover { background: var(--kiku-bg); }

        .topic-card-content {
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
            animation: slideDown .3s ease;
        }
        @keyframes slideDown { from { opacity: 0; } to { opacity: 1; } }

        .topic-meta { flex: 1; }
        .topic-description { font-size: 14px; color: var(--ink-soft); margin-top: 4px; }
        .topic-stats { display: flex; gap: 1.5rem; margin-top: 10px; font-size: 13px; color: var(--ink-muted); }
        .topic-stat { display: flex; align-items: center; gap: 6px; }
        .difficulty-dots { display: flex; gap: 4px; }
        .difficulty-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
        .difficulty-dot.filled { background: var(--mushikuri); }

        /* ── Exercise Styles ─────────────────────────────────── */
        .exercises { display: flex; flex-direction: column; gap: 16px; margin-top: 1.5rem; }
        .exercise-card {
            border: none;
            border-radius: var(--radius);
            padding: 20px 24px;
            background: var(--bg-card);
            box-shadow: var(--shadow-sm);
        }
        .exercise-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
        }
        .exercise-number {
            font-weight: 700;
            color: var(--kiku);
            font-size: 1.2rem;
            min-width: 30px;
        }
        .exercise-content { flex: 1; }
        .exercise-title { font-weight: 600; margin-bottom: 6px; font-size: 15px; }
        .exercise-hints {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-light);
        }
        .hint {
            margin-bottom: 12px;
            padding: 14px 18px;
            background: var(--kiku-bg);
            border-left: 3px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .hint-label {
            font-weight: 600;
            color: var(--kiku);
            font-size: 13px;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .hint-text { font-size: 15px; color: var(--ink); line-height: 1.7; }

        .solution {
            margin-top: 14px;
            padding: 16px 18px;
            background: var(--kiku-light);
            border-left: 3px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .solution-label {
            font-weight: 600;
            color: var(--kiku);
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .solution-text { font-size: 15px; color: var(--ink); line-height: 1.7; }

        /* ── Theory Card ────────────────────────────────────── */
        .theory-card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }
        .theory-title {
            font-family: var(--serif);
            font-size: clamp(18px, 2.5vw, 22px);
            font-weight: 400;
            margin-bottom: 16px;
        }
        .theory-content { line-height: 1.8; color: var(--ink); }
        .theory-content p { margin-bottom: 14px; }
        .theory-content ul, .theory-content ol { margin-left: 1.5rem; line-height: 1.8; }

        .key-insight {
            margin: 20px 0;
            padding: 16px 20px;
            background: var(--kiku-bg);
            border-left: 4px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .key-insight-title {
            font-weight: 700;
            color: var(--kiku);
            margin-bottom: 6px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        /* ── Utility ────────────────────────────────────────── */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 2rem; }
        .mb-1 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 2rem; }

        .expand-icon { transition: transform .3s ease; color: var(--ink-muted); }
        .expand-icon.collapsed { transform: rotate(0deg); }
        .expand-icon.expanded { transform: rotate(180deg); }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 700px) {
            main { padding: 1.25rem; }
            .tutor-header { padding: 14px 1rem; }
            .tutor-header h1 { font-size: 16px; }
            .quiz-results { grid-template-columns: 1fr; }
            .topic-stats { flex-direction: column; gap: 8px; }
        }
    </style>

<body>
        <div class="tutor-header">
        <a href="index.html" class="back-link">← Lernportal</a>
        <h1>📈 Kurvendiskussion</h1>
    </div>

    <main>
        <!-- Quiz Phase -->
        <section id="quiz-phase" class="quiz-container">
            <div class="progress-bar">
                <div class="progress-fill" id="quiz-progress" style="width: 0%;"></div>
            </div>

            <div class="quiz-header">
                <div class="quiz-question-counter" id="question-counter">Frage 1 von 8</div>
                <div class="quiz-question-title" id="question-text"></div>
            </div>

            <div class="quiz-options" id="quiz-options"></div>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-primary" id="next-btn" style="display: none;">Weiter →</button>
            </div>
        </section>

        <!-- Results Phase -->
        <section id="results-phase" class="hidden">
            <div class="text-center mb-2">
                <h2 style="font-size: 1.75rem; margin-bottom: 1rem;">Quiz abgeschlossen! 🎉</h2>
                <p style="color: var(--ink-soft); margin-bottom: 2rem;">Deine Ergebnisse pro Thema:</p>
            </div>

            <div class="quiz-results" id="results-grid"></div>

            <div class="text-center mt-2">
                <button class="btn btn-secondary" id="retake-quiz-btn">Quiz wiederholen</button>
            </div>
        </section>

        <!-- Learning Path Phase -->
        <section id="learning-phase" class="hidden">
            <div style="margin-bottom: 2rem;">
                <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Dein Lernpfad</h2>
                <p style="color: var(--ink-soft); margin-bottom: 1.5rem;">Wähle ein Thema, um zu lernen und zu üben</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="learning-progress" style="width: 0%;"></div>
                </div>
            </div>

            <div class="learning-path" id="learning-path-container"></div>

            <div class="text-center mt-2">
                <button class="btn btn-secondary" id="restart-quiz-btn" style="font-size:0.875rem;">Wissensstand per Quiz testen →</button>
            </div>
        </section>

        <!-- Learning Module Phase -->
        <section id="module-phase" class="hidden">
            <button class="btn btn-secondary btn-small" id="back-to-path-btn" style="margin-bottom: 1.5rem;">← Zurück zum Lernpfad</button>

            <div id="module-content"></div>
        </section>
    </main>

    <script>
        // ============= DATA =============

        const QUIZ_DATA = {
            questions: [
                {
                    id: 1,
                    topic: "Nullstellen & Symmetrie",
                    text: "Bestimme die Nullstellen von \\( f(x) = x^3 - 4x \\).",
                    options: [
                        "\\( x = 0, 2, -2 \\)",
                        "\\( x = 0, 4 \\)",
                        "\\( x = 2, -2 \\)",
                        "\\( x = 0 \\)"
                    ],
                    correct: 0
                },
                {
                    id: 2,
                    topic: "Nullstellen & Symmetrie",
                    text: "Bestimme die Symmetrieart der Funktion \\( f(x) = x^4 - 2x^2 + 1 \\).",
                    options: [
                        "Punktsymmetrie zum Ursprung",
                        "Achsensymmetrie zur y-Achse",
                        "Keine Symmetrie",
                        "Symmetrie zur x-Achse"
                    ],
                    correct: 1
                },
                {
                    id: 3,
                    topic: "Extrempunkte",
                    text: "Gegeben ist \\( f(x) = x^3 - 3x \\). Bestimme die Art des Extrempunkts bei \\( x = 1 \\).",
                    options: [
                        "Hochpunkt",
                        "Tiefpunkt",
                        "Wendepunkt",
                        "Sattelpunkt"
                    ],
                    correct: 1
                },
                {
                    id: 4,
                    topic: "Extrempunkte",
                    text: "Gib die notwendige Bedingung für einen Extrempunkt an.",
                    options: [
                        "\\( f'(x) > 0 \\)",
                        "\\( f'(x) = 0 \\) und \\( f''(x) \\neq 0 \\)",
                        "\\( f''(x) = 0 \\)",
                        "\\( f(x) = 0 \\)"
                    ],
                    correct: 1
                },
                {
                    id: 5,
                    topic: "Wendepunkte & Sattelpunkte",
                    text: "Gib die charakterisierende Bedingung für einen Wendepunkt an.",
                    options: [
                        "\\( f'(x) = 0 \\)",
                        "\\( f''(x) = 0 \\) mit Krümmungswechsel",
                        "\\( f'''(x) = 0 \\)",
                        "\\( f(x) = 0 \\)"
                    ],
                    correct: 1
                },
                {
                    id: 6,
                    topic: "Wendepunkte & Sattelpunkte",
                    text: "Bestimme die Wendepunkte von \\( f(x) = x^3 - 6x^2 \\).",
                    options: [
                        "\\( x = 2 \\)",
                        "\\( x = 0 \\) und \\( x = 4 \\)",
                        "\\( x = 2 \\) und \\( x = -2 \\)",
                        "\\( x = 0 \\)"
                    ],
                    correct: 0
                },
                {
                    id: 7,
                    topic: "Globalverhalten & Monotonie",
                    text: "Bestimme das Globalverhalten für \\( f(x) = -2x^3 + x \\) wenn \\( x \\to +\\infty \\).",
                    options: [
                        "\\( f(x) \\to +\\infty \\)",
                        "\\( f(x) \\to -\\infty \\)",
                        "\\( f(x) \\to 0 \\)",
                        "\\( f(x) \\to 1 \\)"
                    ],
                    correct: 1
                },
                {
                    id: 8,
                    topic: "Globalverhalten & Monotonie",
                    text: "Gegeben ist \\( f(x) = x^2 - 2x + 1 \\). Auf welchen Intervallen ist \\( f \\) monoton wachsend?",
                    options: [
                        "\\( (-\\infty, 0) \\)",
                        "\\( (1, +\\infty) \\)",
                        "\\( (-\\infty, 1) \\)",
                        "Überall außer bei \\( x = 1 \\)"
                    ],
                    correct: 1
                }
            ]
        };

        const TOPIC_DATA = {
            "Nullstellen & Symmetrie": {
                description: "Berechnung von Nullstellen und Untersuchung von Punkt-/Achsensymmetrie",
                difficulty: 1,
                estimatedTime: "40 min"
            },
            "Extrempunkte": {
                description: "Finden von Hoch- und Tiefpunkten mittels Ableitungskriterien",
                difficulty: 2,
                estimatedTime: "50 min"
            },
            "Wendepunkte & Sattelpunkte": {
                description: "Bestimmung von Wendepunkten und Analyse des Krümmungsverhaltens",
                difficulty: 2,
                estimatedTime: "45 min"
            },
            "Globalverhalten & Monotonie": {
                description: "Verhalten im Unendlichen und Monotonie-Intervalle bestimmen",
                difficulty: 2,
                estimatedTime: "55 min"
            }
        };

        const LEARNING_MODULES = {
            "Nullstellen & Symmetrie": {
                theory: `
                    <div class="theory-card">
                        <div class="theory-title">Nullstellen & Symmetrie – Theorie</div>
                        <div class="theory-content">
                            <h4 style="font-weight: 600; margin-top: 0; margin-bottom: 0.75rem;">Nullstellen berechnen:</h4>
                            <p>Eine <strong>Nullstelle</strong> einer Funktion \\( f(x) \\) ist ein Wert \\( x_0 \\), für den \\( f(x_0) = 0 \\) gilt. Geometrisch sind dies die Schnittpunkte mit der x-Achse.</p>

        // ============= INITIALIZATION =============
        function initializeApp() {

        function showQuestion(index) {
            const question = QUIZ_DATA.questions[index];
            const progress = ((index) / QUIZ_DATA.questions.length) * 100;
            document.getElementById('quiz-progress').style.width = progress + '%';
            document.getElementById('question-counter').textContent = `Frage ${index + 1} von ${QUIZ_DATA.questions.length}`;

            // Render question with MathJax
            document.getElementById('question-text').innerHTML = question.text;

            const optionsContainer = document.getElementById('quiz-options');
            optionsContainer.innerHTML = '';

            question.options.forEach((option, i) => {
                const label = document.createElement('label');
                label.className = 'quiz-option';
                label.innerHTML = `
                    <input type="radio" name="answer" value="${i}" ${appState.answers[index] === i ? 'checked' : ''}>
                    <span>${option}</span>
                `;
                label.addEventListener('change', (e) => {
                    appState.answers[index] = parseInt(e.target.value);
                    document.querySelectorAll('.quiz-option').forEach((opt, idx) => {
                        if (idx === parseInt(e.target.value)) {
                            opt.classList.add('selected');
                        } else {
                            opt.classList.remove('selected');
                        }
                    });
                    document.getElementById('next-btn').style.display = 'inline-block';
                });
                optionsContainer.appendChild(label);
            });

            // Update button text for last question
            const isLast = (index === QUIZ_DATA.questions.length - 1);
            document.getElementById('next-btn').textContent = isLast ? 'Quiz auswerten →' : 'Weiter →';

            // Show next button if answer selected
            if (appState.answers[index] !== undefined) {
                document.querySelectorAll('.quiz-option').forEach((opt, idx) => {
                    if (idx === appState.answers[index]) {
                        opt.classList.add('selected');
                    }
                });
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                document.getElementById('next-btn').style.display = 'none';
            }

            // Update next button handler
            document.getElementById('next-btn').onclick = () => nextQuestion();

            // Typecheck MathJax
            safeTypeset();
        }

        function nextQuestion() {
            if (appState.currentQuestion < QUIZ_DATA.questions.length - 1) {
                appState.currentQuestion++;
                showQuestion(appState.currentQuestion);

                completeQuiz();
            }
        }

        function completeQuiz() {
            appState.quizComplete = true;
            calculateResults();
            saveToLocalStorage();
            showResultsPhase();

        function calculateResults() {
            appState.results = {};
            const topicCounts = {};
            const topicCorrect = {};

            QUIZ_DATA.questions.forEach((question, index) => {
                const topic = question.topic;
                if (!topicCounts[topic]) {
                    topicCounts[topic] = 0;
                    topicCorrect[topic] = 0;
                }
                topicCounts[topic]++;
                if (appState.answers[index] === question.correct) {
                    topicCorrect[topic]++;
                }
            });

            Object.keys(topicCounts).forEach(topic => {
                const correct = topicCorrect[topic];
                const total = topicCounts[topic];
                const percentage = (correct / total) * 100;

                if (percentage >= 80) {
                    appState.results[topic] = 'mastered';
                } else if (percentage >= 50) {
                    appState.results[topic] = 'unsure';
                } else {
                    appState.results[topic] = 'needs-practice';
                }
            });
        }

            document.getElementById('learning-phase').classList.add('hidden');

            grid.innerHTML = '';

            Object.keys(appState.results).forEach(topic => {

                const card = document.createElement('div');

                let statusText = 'Geschafft';
                if (status === 'unsure') {
                    icon = '⚠';
                    statusText = 'Unsicher';

                    statusText = 'Üben nötig';

                    <div class="result-card-title">${topic}</div>

                appState.quizComplete = false;
                appState.currentQuestion = 0;
                appState.answers = [];
                saveToLocalStorage();
                showQuizPhase();
            };

            safeTypeset();
        }

                    const header = card.querySelector('.topic-card-header');
                    const content = card.querySelector('.topic-card-content');
                    const icon = card.querySelector('.expand-icon');

                    header.classList.toggle('collapsed');
                    if (header.classList.contains('collapsed')) {
                        content.style.maxHeight = '0';
                        icon.textContent = '▼';
                    } else {
                        content.style.maxHeight = '1000px';
                        icon.textContent = '▲';
                    }
                });

                const startBtn = card.querySelector('.btn-primary');
                if (startBtn) {
                    startBtn.addEventListener('click', () => {
                        appState.currentModule = topic;
                        showModulePhase(topic);
                    });
                }

                container.appendChild(card);
            });
        }

        function updateLearningProgress() {
            const total = Object.keys(TOPIC_DATA).length;
            const completed = Object.values(appState.results).filter(r => r === 'mastered').length;
            const progress = (completed / total) * 100;
            document.getElementById('learning-progress').style.width = progress + '%';
        }

        // ============= LEARNING MODULE PHASE =============
        function showModulePhase(topic) {
            document.getElementById('quiz-phase').classList.add('hidden');
            document.getElementById('results-phase').classList.add('hidden');
            document.getElementById('learning-phase').classList.add('hidden');
            document.getElementById('module-phase').classList.remove('hidden');

            appState.currentPhase = 'module';
            const module = LEARNING_MODULES[topic];

            let moduleHTML = `
                <div class="learning-module">
                    ${module.theory}
                    <div class="exercises">
            `;

            module.exercises.forEach(exercise => {
                const diffClass = exercise.difficulty.toLowerCase();
                const diffBadgeClass = exercise.difficulty === 'Leicht' ? 'green' : exercise.difficulty === 'Mittel' ? 'amber' : 'red';

                moduleHTML += `
                    <div class="exercise-card">
                        <div class="exercise-header">
                            <div class="exercise-number">${exercise.number}</div>
                            <div class="exercise-content">
                                <div class="exercise-title">${exercise.title}</div>
                                <div class="exercise-difficulty">
                                    <span class="badge badge-${diffBadgeClass}">${exercise.difficulty}</span>
                                </div>
                                <p style="margin-top: 0.75rem; color: var(--ink);">${exercise.text}</p>
                            </div>
                        </div>
                        <div class="exercise-hints" style="display: none;">
                `;

                exercise.hints.forEach((hint, idx) => {
                    moduleHTML += `
                        <div class="hint">
                            <span class="hint-label">Hinweis ${idx + 1}:</span>
                            <div class="hint-text">${hint}</div>
                        </div>
                    `;
                });

                moduleHTML += `
                            <div class="solution">
                                <span class="solution-label">Lösung:</span>
                                <div class="solution-text">${exercise.solution}</div>
                            </div>
                        </div>
                    </div>
                `;
            });

            moduleHTML += `
                    </div>
                </div>
            `;

            document.getElementById('module-content').innerHTML = moduleHTML;

            // Add event listeners for exercise expansion
            document.querySelectorAll('.exercise-card').forEach(card => {
                card.querySelector('.exercise-header').addEventListener('click', () => {
                    const hints = card.querySelector('.exercise-hints');
                    hints.style.display = hints.style.display === 'none' ? 'block' : 'none';
                });
            });

            document.getElementById('back-to-path-btn').onclick = () => {
                appState.currentModule = null;
                showLearningPhase();
            };

            safeTypeset();
        }

        // ============= UTILITY FUNCTIONS =============
        function safeTypeset() {
            if (window.mathJaxReady) {
                MathJax.typesetPromise().catch(function(e){ console.log(e); });
            } else {
                window._pendingTypeset = true;
            }
        }

        // ============= START APP =============
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
