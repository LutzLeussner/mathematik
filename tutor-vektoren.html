        <style>
        /* ── Design tokens (Japanese palette – matching index.html) ─────── */
        :root {
            --kiku:       #5b6e2e;
            --kiku-light: #e8edda;
            --kiku-bg:    #f3f5ec;
            --sango:      #c75c3a;
            --sango-light:#fceee9;
            --fukagawa:   #8a9da7;
            --fukagawa-light:#ecf1f4;
            --mushikuri:  #c8b55e;
            --mushikuri-light:#f7f3e2;
            --bg:         #fffcf6;
            --bg-card:    #ffffff;
            --ink:        #2c2c2c;
            --ink-soft:   #6b6560;
            --ink-muted:  #a09a92;
            --border:     #e8e4de;
            --border-light:#f0ece6;
            --radius:     24px;
            --radius-sm:  14px;
            --radius-xs:  8px;
            --shadow-sm:  0 1px 3px rgba(44,42,38,.05);
            --shadow-md:  0 4px 20px rgba(44,42,38,.07);
            --transition: .25s cubic-bezier(.4,0,.2,1);
            --serif:      'DM Serif Display', Georgia, serif;
            --sans:       'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            font-size: 17px;
            line-height: 1.7;
        }

        /* ── Header ──────────────────────────────────────────── */
        .tutor-header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 18px clamp(1.5rem,4vw,3rem);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--kiku);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--kiku);
            transition: all var(--transition);
            flex-shrink: 0;
            font-family: var(--sans);
        }
        .back-link:hover {
            background: var(--kiku);
            color: #fff;
        }
        .tutor-header h1 {
            font-family: var(--serif);
            font-size: clamp(18px, 2.5vw, 22px);
            font-weight: 400;
            letter-spacing: -.01em;
            flex: 1;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: clamp(2rem,5vw,3.5rem) clamp(1.5rem,4vw,3rem);
        }

        /* ── MathJax ────────────────────────────────────────── */
        mjx-container { overflow-x: auto; max-width: 100%; }
        .MathJax { font-size: 1.05em !important; }

        /* ── Buttons ────────────────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-xs);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            text-align: center;
            font-family: var(--sans);
        }
        .btn-primary {
            background: var(--kiku);
            color: #fff;
        }
        .btn-primary:hover {
            background: #4a5c24;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .btn-secondary {
            background: var(--mushikuri-light);
            color: #8a7a30;
            border: 1.5px solid var(--mushikuri);
        }
        .btn-secondary:hover {
            background: var(--mushikuri);
            color: #fff;
        }
        .btn-success {
            background: var(--kiku-light);
            color: var(--kiku);
            border: 1.5px solid var(--kiku);
        }
        .btn-success:hover {
            background: var(--kiku);
            color: #fff;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* ── Cards ──────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-md); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            user-select: none;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .card-icon.green { background: var(--kiku-light); color: var(--kiku); }
        .card-icon.blue { background: var(--fukagawa-light); color: var(--fukagawa); }
        .card-icon.amber { background: var(--mushikuri-light); color: #8a7a30; }
        .card-icon.red { background: var(--sango-light); color: var(--sango); }

        .card-title {
            flex: 1;
            font-family: var(--serif);
            font-size: clamp(17px, 2vw, 20px);
            font-weight: 400;
        }
        .card-subtitle {
            font-size: 14px;
            color: var(--ink-soft);
            margin-top: 4px;
        }
        .card-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 10px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
        .badge-green { background: var(--kiku-light); color: var(--kiku); }
        .badge-amber { background: var(--mushikuri-light); color: #8a7a30; }
        .badge-red { background: var(--sango-light); color: var(--sango); }

        /* ── Progress Bar ───────────────────────────────────── */
        .progress-bar {
            width: 100%;
            height: 5px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .progress-fill {
            height: 100%;
            background: var(--kiku);
            transition: width .5s;
            border-radius: 3px;
        }

        /* ── Quiz Styles ────────────────────────────────────── */
        .quiz-container { max-width: 700px; margin: 0 auto; }
        .quiz-header { text-align: center; margin-bottom: 2rem; }
        .quiz-question-counter {
            font-size: 13px;
            color: var(--ink-muted);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .quiz-question-title {
            font-family: var(--serif);
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 400;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .quiz-option {
            padding: 16px 20px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg-card);
            font-size: 16px;
            line-height: 1.6;
        }
        .quiz-option:hover {
            border-color: var(--kiku);
            background: var(--kiku-bg);
        }
        .quiz-option input[type="radio"] { margin-right: 12px; cursor: pointer; accent-color: var(--kiku); }
        .quiz-option.selected { border-color: var(--kiku); background: var(--kiku-bg); }
        .quiz-option.correct { border-color: var(--kiku); background: var(--kiku-light); }
        .quiz-option.incorrect { border-color: var(--sango); background: var(--sango-light); }

        /* ── Quiz Results ───────────────────────────────────── */
        .quiz-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin: 2rem 0;
        }
        .result-card {
            padding: 24px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .result-card.mastered { background: var(--kiku-light); border: 1.5px solid var(--kiku); }
        .result-card.unsure { background: var(--mushikuri-light); border: 1.5px solid var(--mushikuri); }
        .result-card.needs-practice { background: var(--sango-light); border: 1.5px solid var(--sango); }
        .result-card-title { font-weight: 600; margin-top: 10px; font-size: 14px; }
        .result-card-status { font-size: 1.1rem; margin-top: 6px; font-weight: 700; }
        .result-card.mastered .result-card-status { color: var(--kiku); }
        .result-card.unsure .result-card-status { color: #8a7a30; }
        .result-card.needs-practice .result-card-status { color: var(--sango); }
        .result-icon { font-size: 2.25rem; }

        /* ── Learning Path ──────────────────────────────────── */
        .learning-path { display: flex; flex-direction: column; gap: 16px; }

        .topic-card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition);
        }
        .topic-card:hover { box-shadow: var(--shadow-md); }

        .topic-card-header {
            padding: 20px 24px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-card);
            transition: background var(--transition);
        }
        .topic-card-header:hover { background: var(--kiku-bg); }

        .topic-card-content {
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
            animation: slideDown .3s ease;
        }
        @keyframes slideDown { from { opacity: 0; } to { opacity: 1; } }

        .topic-meta { flex: 1; }
        .topic-description { font-size: 14px; color: var(--ink-soft); margin-top: 4px; }
        .topic-stats { display: flex; gap: 1.5rem; margin-top: 10px; font-size: 13px; color: var(--ink-muted); }
        .topic-stat { display: flex; align-items: center; gap: 6px; }
        .difficulty-dots { display: flex; gap: 4px; }
        .difficulty-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
        .difficulty-dot.filled { background: var(--mushikuri); }

        /* ── Exercise Styles ─────────────────────────────────── */
        .exercises { display: flex; flex-direction: column; gap: 16px; margin-top: 1.5rem; }
        .exercise-card {
            border: none;
            border-radius: var(--radius);
            padding: 20px 24px;
            background: var(--bg-card);
            box-shadow: var(--shadow-sm);
        }
        .exercise-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
        }
        .exercise-number {
            font-weight: 700;
            color: var(--kiku);
            font-size: 1.2rem;
            min-width: 30px;
        }
        .exercise-content { flex: 1; }
        .exercise-title { font-weight: 600; margin-bottom: 6px; font-size: 15px; }
        .exercise-hints {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-light);
        }
        .hint {
            margin-bottom: 12px;
            padding: 14px 18px;
            background: var(--kiku-bg);
            border-left: 3px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .hint-label {
            font-weight: 600;
            color: var(--kiku);
            font-size: 13px;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .hint-text { font-size: 15px; color: var(--ink); line-height: 1.7; }

        .solution {
            margin-top: 14px;
            padding: 16px 18px;
            background: var(--kiku-light);
            border-left: 3px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .solution-label {
            font-weight: 600;
            color: var(--kiku);
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .solution-text { font-size: 15px; color: var(--ink); line-height: 1.7; }

        /* ── Theory Card ────────────────────────────────────── */
        .theory-card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }
        .theory-title {
            font-family: var(--serif);
            font-size: clamp(18px, 2.5vw, 22px);
            font-weight: 400;
            margin-bottom: 16px;
        }
        .theory-content { line-height: 1.8; color: var(--ink); }
        .theory-content p { margin-bottom: 14px; }
        .theory-content ul, .theory-content ol { margin-left: 1.5rem; line-height: 1.8; }

        .key-insight {
            margin: 20px 0;
            padding: 16px 20px;
            background: var(--kiku-bg);
            border-left: 4px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .key-insight-title {
            font-weight: 700;
            color: var(--kiku);
            margin-bottom: 6px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        /* ── Utility ────────────────────────────────────────── */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 2rem; }
        .mb-1 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 2rem; }

        .expand-icon { transition: transform .3s ease; color: var(--ink-muted); }
        .expand-icon.collapsed { transform: rotate(0deg); }
        .expand-icon.expanded { transform: rotate(180deg); }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 700px) {
            main { padding: 1.25rem; }
            .tutor-header { padding: 14px 1rem; }
            .tutor-header h1 { font-size: 16px; }
            .quiz-results { grid-template-columns: 1fr; }
            .topic-stats { flex-direction: column; gap: 8px; }
        }
    </style>

    <main>
        <!-- Quiz Phase -->
        <section id="quiz-phase" class="quiz-container">
            <div class="progress-bar">
                <div class="progress-fill" id="quiz-progress" style="width: 0%;"></div>
            </div>

                <div class="quiz-question-counter" id="question-counter">Frage 1 von 8</div>
                <div class="quiz-question-title" id="question-text"></div>
            </div>

            <div class="quiz-options" id="quiz-options"></div>

            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button class="btn btn-primary" id="next-btn" style="display: none;">Weiter →</button>
            </div>
        </section>

        <!-- Results Phase -->
        <section id="results-phase" class="hidden">
            <div class="text-center mb-2">
                <h2 style="font-size: 1.75rem; margin-bottom: 1rem;">Quiz abgeschlossen! 🎉</h2>
                <p style="color: var(--ink-soft); margin-bottom: 2rem;">Deine Ergebnisse pro Thema:</p>
            </div>

            <div class="quiz-results" id="results-grid"></div>

            <div class="text-center mt-2">
                <button class="btn btn-secondary" id="retake-quiz-btn">Quiz wiederholen</button>

        </section>

        <!-- Learning Path Phase -->
        <section id="learning-phase" class="hidden">
            <div style="margin-bottom: 2rem;">
                <h2 style="font-size: 1.5rem; margin-bottom: 0.5rem;">Dein Lernpfad</h2>
                <p style="color: var(--ink-soft); margin-bottom: 1.5rem;">Wähle ein Thema, um zu lernen und zu üben</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="learning-progress" style="width: 0%;"></div>
                </div>
            </div>

            <div class="learning-path" id="learning-path-container"></div>

            <div class="text-center mt-2">

        <!-- Learning Module Phase -->
        <section id="module-phase" class="hidden">
            <button class="btn btn-secondary btn-small" id="back-to-path-btn" style="margin-bottom: 1.5rem;">← Zurück zum Lernpfad</button>

            <div id="module-content"></div>
        </section>

    <script>
        // ============= DATA =============
        const QUIZ_DATA = {
            questions: [
                {
                    id: 1,
                    topic: "Vektoren im Raum",
                    text: "Gegeben sind die Punkte \\( A(1, 2, 3) \\) und \\( B(4, 5, 6) \\). Bestimme den Ortsvektor \\( \\vec{AB} \\).",
                    options: [
                        "\\( \\vec{AB} = \\begin{pmatrix} 3 \\\\ 3 \\\\ 3 \\end{pmatrix} \\)",
                        "\\( \\vec{AB} = \\begin{pmatrix} 5 \\\\ 7 \\\\ 9 \\end{pmatrix} \\)",
                        "\\( \\vec{AB} = \\begin{pmatrix} -3 \\\\ -3 \\\\ -3 \\end{pmatrix} \\)",
                        "\\( \\vec{AB} = \\begin{pmatrix} 1 \\\\ 2 \\\\ 3 \\end{pmatrix} \\)"
                    ],
                    correct: 0
                },
                {
                    id: 2,
                    topic: "Vektoren im Raum",
                    text: "Welche der folgenden Aussagen ist richtig? Der Betrag des Vektors \\( \\vec{v} = \\begin{pmatrix} 3 \\\\ 4 \\\\ 0 \\end{pmatrix} \\) ist:",
                    options: [
                        "\\( |\\vec{v}| = 7 \\)",
                        "\\( |\\vec{v}| = 5 \\)",
                        "\\( |\\vec{v}| = \\sqrt{25} = 5 \\)",
                        "\\( |\\vec{v}| = 12 \\)"
                    ],
                    correct: 2
                },
                {
                    id: 3,
                    topic: "Vektoroperationen",
                    text: "Berechne die Summe der Vektoren \\( \\vec{a} = \\begin{pmatrix} 2 \\\\ 1 \\\\ -1 \\end{pmatrix} \\) und \\( \\vec{b} = \\begin{pmatrix} 1 \\\\ 3 \\\\ 2 \\end{pmatrix} \\).",
                    options: [
                        "\\( \\vec{a} + \\vec{b} = \\begin{pmatrix} 3 \\\\ 4 \\\\ 1 \\end{pmatrix} \\)",
                        "\\( \\vec{a} + \\vec{b} = \\begin{pmatrix} 1 \\\\ -2 \\\\ -3 \\end{pmatrix} \\)",
                        "\\( \\vec{a} + \\vec{b} = \\begin{pmatrix} 3 \\\\ 2 \\\\ 1 \\end{pmatrix} \\)",
                        "\\( \\vec{a} + \\vec{b} = \\begin{pmatrix} 2 \\\\ 4 \\\\ 2 \\end{pmatrix} \\)"
                    ],
                    correct: 0
                },
                {
                    id: 4,
                    topic: "Vektoroperationen",
                    text: "Was ist die Skalarmultiplikation \\( 3 \\cdot \\vec{v} \\) für \\( \\vec{v} = \\begin{pmatrix} 1 \\\\ -2 \\\\ 4 \\end{pmatrix} \\)?",
                    options: [
                        "\\( 3\\vec{v} = \\begin{pmatrix} 1 \\\\ -2 \\\\ 4 \\end{pmatrix} \\)",
                        "\\( 3\\vec{v} = \\begin{pmatrix} 3 \\\\ -6 \\\\ 12 \\end{pmatrix} \\)",
                        "\\( 3\\vec{v} = \\begin{pmatrix} 3 \\\\ 2 \\\\ 4 \\end{pmatrix} \\)",
                        "\\( 3\\vec{v} = \\begin{pmatrix} 1 \\\\ -6 \\\\ 4 \\end{pmatrix} \\)"
                    ],
                    correct: 1
                },
                {
                    id: 5,
                    topic: "Skalarprodukt & Orthogonalität",
                    text: "Berechne das Skalarprodukt \\( \\vec{a} \\cdot \\vec{b} \\) für \\( \\vec{a} = \\begin{pmatrix} 2 \\\\ 1 \\\\ 3 \\end{pmatrix} \\) und \\( \\vec{b} = \\begin{pmatrix} 1 \\\\ 4 \\\\ -1 \\end{pmatrix} \\).",
                    options: [
                        "\\( \\vec{a} \\cdot \\vec{b} = 3 \\)",
                        "\\( \\vec{a} \\cdot \\vec{b} = 9 \\)",
                        "\\( \\vec{a} \\cdot \\vec{b} = 5 \\)",
                        "\\( \\vec{a} \\cdot \\vec{b} = -1 \\)"
                    ],
                    correct: 0
                },
                {
                    id: 6,
                    topic: "Skalarprodukt & Orthogonalität",
                    text: "Wann sind zwei Vektoren \\( \\vec{a} \\) und \\( \\vec{b} \\) orthogonal zueinander?",
                    options: [
                        "Wenn \\( |\\vec{a}| = |\\vec{b}| \\)",
                        "Wenn \\( \\vec{a} \\cdot \\vec{b} = 0 \\)",
                        "Wenn \\( \\vec{a} - \\vec{b} = \\vec{0} \\)",
                        "Wenn \\( \\vec{a} \\times \\vec{b} = \\vec{0} \\)"
                    ],
                    correct: 1
                },
                {
                    id: 7,
                    topic: "Anwendungen",
                    text: "Berechne den Mittelpunkt \\( M \\) zwischen den Punkten \\( A(2, 4, 6) \\) und \\( B(8, 10, 12) \\).",
                    options: [
                        "\\( M = (5, 7, 9) \\)",
                        "\\( M = (10, 14, 18) \\)",
                        "\\( M = (3, 3, 3) \\)",
                        "\\( M = (6, 6, 6) \\)"
                    ],
                    correct: 0
                },
                {
                    id: 8,
                    topic: "Anwendungen",
                    text: "Welche Bedingung beschreibt, dass drei Punkte kollinear sind (auf einer Linie liegen)?",
                    options: [
                        "Die Abstände sind alle gleich",

                optionDiv.innerHTML = `
                    <input type="radio" name="option" value="${index}" id="option-${index}">
                    <label for="option-${index}" style="flex: 1; cursor: pointer; margin: 0;">${option}</label>
                `;
                optionDiv.addEventListener('click', () => selectOption(index));
                optionsContainer.appendChild(optionDiv);
            });

            const nextBtn = document.getElementById('next-btn');
            nextBtn.style.display = 'none';
            nextBtn.onclick = () => nextQuestion();

            safeTypeset();
        }

        function selectOption(index) {
            appState.answers[appState.currentQuestion] = index;
            saveToLocalStorage();

            const options = document.querySelectorAll('.quiz-option');
            options.forEach(opt => opt.classList.remove('selected'));
            options[index].classList.add('selected');

            document.getElementById('next-btn').style.display = 'inline-block';
        }

        function nextQuestion() {
            appState.currentQuestion++;

            if (appState.currentQuestion >= QUIZ_DATA.questions.length) {
                calculateResults();
            } else {
                showQuizPhase();
            }
        }

        function calculateResults() {
            appState.results = {};
            const topics = Object.keys(TOPIC_DATA);

            topics.forEach(topic => {
                appState.results[topic] = 'mastered';
            });

            QUIZ_DATA.questions.forEach((question, index) => {
                const topic = question.topic;
                const isCorrect = appState.answers[index] === question.correct;

                if (!isCorrect) {
                    if (appState.results[topic] === 'mastered') {
                        appState.results[topic] = 'unsure';
                    } else if (appState.results[topic] === 'unsure') {
                        appState.results[topic] = 'needs-practice';
                    }
                }
            });

            appState.quizComplete = true;
            appState.currentQuestion = 0;
            saveToLocalStorage();
            showResultsPhase();
        }

        // ============= RESULTS PHASE =============
        function showResultsPhase() {
            document.getElementById('quiz-phase').classList.add('hidden');
            document.getElementById('results-phase').classList.remove('hidden');
            document.getElementById('learning-phase').classList.add('hidden');
            document.getElementById('module-phase').classList.add('hidden');

            const resultsGrid = document.getElementById('results-grid');
            resultsGrid.innerHTML = '';

            const topics = Object.keys(TOPIC_DATA);
            topics.forEach(topic => {
                const status = appState.results[topic];
                const statusMap = {
                    'mastered': { icon: '✅', label: 'Beherrscht', class: 'mastered' },
                    'unsure': { icon: '⚠️', label: 'Unsicher', class: 'unsure' },
                    'needs-practice': { icon: '❌', label: 'Üben nötig', class: 'needs-practice' }
                };

                const info = statusMap[status];
                const card = document.createElement('div');
                card.className = `result-card ${info.class}`;
                card.innerHTML = `
                    <div class="result-icon">${info.icon}</div>
                    <div class="result-card-title">${topic}</div>
                    <div class="result-card-status">${info.label}</div>
                `;
                resultsGrid.appendChild(card);
            });
        }

        // ============= LEARNING PATH PHASE =============
        function showLearningPhase() {
            document.getElementById('quiz-phase').classList.add('hidden');
            document.getElementById('results-phase').classList.add('hidden');
            document.getElementById('learning-phase').classList.remove('hidden');
            document.getElementById('module-phase').classList.add('hidden');

            const pathContainer = document.getElementById('learning-path-container');
            pathContainer.innerHTML = '';

            const orderedTopics = Object.keys(TOPIC_DATA).sort((a, b) => {
                const statusOrder = { 'needs-practice': 0, 'unsure': 1, 'mastered': 2 };
                return statusOrder[appState.results[a]] - statusOrder[appState.results[b]];
            });

            orderedTopics.forEach((topic, index) => {
                const data = TOPIC_DATA[topic];
                const status = appState.results[topic];

                const card = document.createElement('div');
                card.className = 'topic-card';

                const statusIcon = {
                    'needs-practice': '🔴',
                    'unsure': '🟡',
                    'mastered': '🟢'
                }[status];

                card.innerHTML = `
                    <div class="topic-card-header">
                        <div class="card-icon blue">${data.icon}</div>
                        <div class="topic-meta">
                            <div class="card-title">${topic}</div>
                            <div class="topic-description">${data.description}</div>
                            <div class="topic-stats">
                                <div class="topic-stat">
                                    <span>Schwierigkeit:</span>
                                    <div class="difficulty-dots">
                                        ${Array(3).fill(0).map((_, i) => `<div class="difficulty-dot ${i < data.difficulty ? 'filled' : ''}"></div>`).join('')}
                                    </div>
                                </div>
                                <div class="topic-stat">⏱️ ${data.estimatedTime}</div>
                                <div class="topic-stat">${statusIcon} ${status === 'needs-practice' ? 'Üben nötig' : status === 'unsure' ? 'Unsicher' : 'Beherrscht'}</div>
                            </div>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    appState.currentModule = topic;
                    saveToLocalStorage();
                    showModulePhase();
                });

                pathContainer.appendChild(card);
            });

            safeTypeset();
        }

        function startModule(topic) {
            appState.currentModule = topic;
            saveToLocalStorage();
            showModulePhase();
        }

        // ============= MODULE PHASE =============
        function showModulePhase() {
            document.getElementById('quiz-phase').classList.add('hidden');
            document.getElementById('results-phase').classList.add('hidden');
            document.getElementById('learning-phase').classList.add('hidden');
            document.getElementById('module-phase').classList.remove('hidden');

            const topic = appState.currentModule;
            const module = LEARNING_MODULES[topic];

            let html = `<h2 style="font-size: 1.75rem; margin-bottom: 1.5rem;">📖 ${topic}</h2>`;

            // Theory
            html += module.theory;

            // Exercises
            html += `
                <h3 style="font-size: 1.35rem; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 2px solid var(--fukagawa); padding-bottom: 0.75rem;">Übungsaufgaben</h3>
                <div class="exercises">
            `;

            module.exercises.forEach((exercise) => {
                const difficultyClass = exercise.difficulty === 'Leicht' ? 'badge-green' :
                                       exercise.difficulty === 'Mittel' ? 'badge-amber' : 'badge-red';
                const difficultyEmoji = exercise.difficulty === 'Leicht' ? '🟢' :
                                       exercise.difficulty === 'Mittel' ? '🟡' : '🔴';

                html += `
                    <div class="exercise-card">
                        <div class="exercise-header" onclick="toggleExerciseHints(${module.exercises.indexOf(exercise)})">
                            <div class="exercise-number">${exercise.number}.</div>
                            <div class="exercise-content">
                                <div class="exercise-title">${exercise.title}</div>
                                <div style="color: var(--ink); margin-top: 0.75rem; line-height: 1.6;">${exercise.text}</div>
                                <span class="badge ${difficultyClass}" style="margin-top: 0.75rem;">
                                    ${difficultyEmoji} ${exercise.difficulty}
                                </span>
                            </div>
                        </div>
                        <div class="exercise-hints" id="hints-${module.exercises.indexOf(exercise)}" style="display: none;">
                `;

                exercise.hints.forEach((hint, i) => {
                    html += `
                        <div class="hint" id="hint-${module.exercises.indexOf(exercise)}-${i}" style="display: none;">
                            <div class="hint-label">Hinweis ${i + 1}:</div>
                            <div class="hint-text">${hint}</div>
                        </div>
                    `;
                });

                html += `
                            <div style="margin-top: 1rem;">
                                <button class="btn btn-secondary btn-small" onclick="revealHint(${module.exercises.indexOf(exercise)})">
                                    Nächster Hinweis →
                                </button>
                            </div>
                            <div class="solution" id="solution-${module.exercises.indexOf(exercise)}" style="display: none;">
                                <div class="solution-label">Lösung:</div>
                                <div class="solution-text">${exercise.solution}</div>
                            </div>
                            <button class="btn btn-success btn-small" style="margin-top: 1rem;" onclick="revealSolution(${module.exercises.indexOf(exercise)})">
                                Lösung anzeigen
                            </button>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;

            document.getElementById('module-content').innerHTML = html;

            // Set up back button
            document.getElementById('back-to-path-btn').onclick = () => showLearningPhase();

            safeTypeset();
        }

        let revealedHints = {};

        function toggleExerciseHints(index) {
            const container = document.getElementById(`hints-${index}`);
            const isHidden = container.style.display === 'none';
            container.style.display = isHidden ? 'block' : 'none';
            if (!revealedHints[index]) {
                revealedHints[index] = 0;
            }
        }

        function revealHint(exerciseIndex) {
            if (!revealedHints[exerciseIndex]) {
                revealedHints[exerciseIndex] = 0;
            }
            const hintIndex = revealedHints[exerciseIndex];
            const hint = document.getElementById(`hint-${exerciseIndex}-${hintIndex}`);
            if (hint) {
                hint.style.display = 'block';
                revealedHints[exerciseIndex]++;
                safeTypeset();
            }
        }

        function revealSolution(exerciseIndex) {
            const solution = document.getElementById(`solution-${exerciseIndex}`);
            solution.style.display = 'block';
            safeTypeset();
        }

        // ============= EVENT LISTENERS =============
        document.getElementById('retake-quiz-btn').addEventListener('click', () => {
            appState.currentQuestion = 0;
            appState.answers = [];
            appState.quizComplete = false;
            appState.results = {};
            revealedHints = {};
            saveToLocalStorage();
            showQuizPhase();
        });

        document.getElementById('restart-quiz-btn').addEventListener('click', () => {
            appState.currentQuestion = 0;
            appState.answers = [];
            appState.quizComplete = false;
            appState.results = {};
            revealedHints = {};
            saveToLocalStorage();
            showQuizPhase();
        });

        var startPathEl = document.getElementById('start-path-btn');
        if (startPathEl) { startPathEl.addEventListener('click', function() {
            var weakTopics = Object.keys(appState.results).filter(function(t) { return appState.results[t] !== 'mastered'; });
            if (weakTopics.length > 0) { startModule(weakTopics[0]); }
        }); }

        // ============= SAFE MATHJAX HELPER =============
        function safeTypeset() {
            if (window.mathJaxReady && typeof MathJax !== 'undefined' && MathJax.typesetPromise) {
                return MathJax.typesetPromise().catch(err => console.log('MathJax:', err));
            }
            // MathJax not ready yet — flag for re-typeset when it loads
            window._pendingTypeset = true;
            return Promise.resolve();
        }

        // ============= INITIALIZE =============
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeApp);
        } else {
            initializeApp();
        }
    </script>
</body>
</html>
