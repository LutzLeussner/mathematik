        <style>
        /* ── Design tokens (Japanese palette – matching index.html) ─────── */
        :root {
            --kiku:       #5b6e2e;
            --kiku-light: #e8edda;
            --kiku-bg:    #f3f5ec;
            --sango:      #c75c3a;
            --sango-light:#fceee9;
            --fukagawa:   #8a9da7;
            --fukagawa-light:#ecf1f4;
            --mushikuri:  #c8b55e;
            --mushikuri-light:#f7f3e2;
            --bg:         #fffcf6;
            --bg-card:    #ffffff;
            --ink:        #2c2c2c;
            --ink-soft:   #6b6560;
            --ink-muted:  #a09a92;
            --border:     #e8e4de;
            --border-light:#f0ece6;
            --radius:     24px;
            --radius-sm:  14px;
            --radius-xs:  8px;
            --shadow-sm:  0 1px 3px rgba(44,42,38,.05);
            --shadow-md:  0 4px 20px rgba(44,42,38,.07);
            --transition: .25s cubic-bezier(.4,0,.2,1);
            --serif:      'DM Serif Display', Georgia, serif;
            --sans:       'Inter', system-ui, -apple-system, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 16px; scroll-behavior: smooth; }
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--ink);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            font-size: 17px;
            line-height: 1.7;
        }

        /* ── Header ──────────────────────────────────────────── */
        .tutor-header {
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 18px clamp(1.5rem,4vw,3rem);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--kiku);
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1.5px solid var(--kiku);
            transition: all var(--transition);
            flex-shrink: 0;
            font-family: var(--sans);
        }
        .back-link:hover {
            background: var(--kiku);
            color: #fff;
        }
        .tutor-header h1 {
            font-family: var(--serif);
            font-size: clamp(18px, 2.5vw, 22px);
            font-weight: 400;
            letter-spacing: -.01em;
            flex: 1;
        }

        main {
            max-width: 900px;
            margin: 0 auto;
            padding: clamp(2rem,5vw,3.5rem) clamp(1.5rem,4vw,3rem);
        }

        /* ── MathJax ────────────────────────────────────────── */
        mjx-container { overflow-x: auto; max-width: 100%; }
        .MathJax { font-size: 1.05em !important; }

        /* ── Buttons ────────────────────────────────────────── */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-xs);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            text-align: center;
            font-family: var(--sans);
        }
        .btn-primary {
            background: var(--kiku);
            color: #fff;
        }
        .btn-primary:hover {
            background: #4a5c24;
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .btn-secondary {
            background: var(--mushikuri-light);
            color: #8a7a30;
            border: 1.5px solid var(--mushikuri);
        }
        .btn-secondary:hover {
            background: var(--mushikuri);
            color: #fff;
        }
        .btn-success {
            background: var(--kiku-light);
            color: var(--kiku);
            border: 1.5px solid var(--kiku);
        }
        .btn-success:hover {
            background: var(--kiku);
            color: #fff;
        }
        .btn-small {
            padding: 8px 16px;
            font-size: 13px;
        }

        /* ── Cards ──────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition);
        }
        .card:hover { box-shadow: var(--shadow-md); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-light);
            cursor: pointer;
            user-select: none;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            flex-shrink: 0;
        }
        .card-icon.green { background: var(--kiku-light); color: var(--kiku); }
        .card-icon.blue { background: var(--fukagawa-light); color: var(--fukagawa); }
        .card-icon.amber { background: var(--mushikuri-light); color: #8a7a30; }
        .card-icon.red { background: var(--sango-light); color: var(--sango); }

        .card-title {
            flex: 1;
            font-family: var(--serif);
            font-size: clamp(17px, 2vw, 20px);
            font-weight: 400;
        }
        .card-subtitle {
            font-size: 14px;
            color: var(--ink-soft);
            margin-top: 4px;
        }
        .card-meta {
            display: flex;
            gap: 1rem;
            align-items: center;
            margin-top: 10px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
        .badge-green { background: var(--kiku-light); color: var(--kiku); }
        .badge-amber { background: var(--mushikuri-light); color: #8a7a30; }
        .badge-red { background: var(--sango-light); color: var(--sango); }

        /* ── Progress Bar ───────────────────────────────────── */
        .progress-bar {
            width: 100%;
            height: 5px;
            background: var(--border-light);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .progress-fill {
            height: 100%;
            background: var(--kiku);
            transition: width .5s;
            border-radius: 3px;
        }

        /* ── Quiz Styles ────────────────────────────────────── */
        .quiz-container { max-width: 700px; margin: 0 auto; }
        .quiz-header { text-align: center; margin-bottom: 2rem; }
        .quiz-question-counter {
            font-size: 13px;
            color: var(--ink-muted);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .quiz-question-title {
            font-family: var(--serif);
            font-size: clamp(20px, 3vw, 26px);
            font-weight: 400;
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .quiz-option {
            padding: 16px 20px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            background: var(--bg-card);
            font-size: 16px;
            line-height: 1.6;
        }
        .quiz-option:hover {
            border-color: var(--kiku);
            background: var(--kiku-bg);
        }
        .quiz-option input[type="radio"] { margin-right: 12px; cursor: pointer; accent-color: var(--kiku); }
        .quiz-option.selected { border-color: var(--kiku); background: var(--kiku-bg); }
        .quiz-option.correct { border-color: var(--kiku); background: var(--kiku-light); }
        .quiz-option.incorrect { border-color: var(--sango); background: var(--sango-light); }

        /* ── Quiz Results ───────────────────────────────────── */
        .quiz-results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 14px;
            margin: 2rem 0;
        }
        .result-card {
            padding: 24px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .result-card.mastered { background: var(--kiku-light); border: 1.5px solid var(--kiku); }
        .result-card.unsure { background: var(--mushikuri-light); border: 1.5px solid var(--mushikuri); }
        .result-card.needs-practice { background: var(--sango-light); border: 1.5px solid var(--sango); }
        .result-card-title { font-weight: 600; margin-top: 10px; font-size: 14px; }
        .result-card-status { font-size: 1.1rem; margin-top: 6px; font-weight: 700; }
        .result-card.mastered .result-card-status { color: var(--kiku); }
        .result-card.unsure .result-card-status { color: #8a7a30; }
        .result-card.needs-practice .result-card-status { color: var(--sango); }
        .result-icon { font-size: 2.25rem; }

        /* ── Learning Path ──────────────────────────────────── */
        .learning-path { display: flex; flex-direction: column; gap: 16px; }

        .topic-card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition);
        }
        .topic-card:hover { box-shadow: var(--shadow-md); }

        .topic-card-header {
            padding: 20px 24px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-card);
            transition: background var(--transition);
        }
        .topic-card-header:hover { background: var(--kiku-bg); }

        .topic-card-content {
            padding: 20px 24px;
            border-top: 1px solid var(--border-light);
            animation: slideDown .3s ease;
        }
        @keyframes slideDown { from { opacity: 0; } to { opacity: 1; } }

        .topic-meta { flex: 1; }
        .topic-description { font-size: 14px; color: var(--ink-soft); margin-top: 4px; }
        .topic-stats { display: flex; gap: 1.5rem; margin-top: 10px; font-size: 13px; color: var(--ink-muted); }
        .topic-stat { display: flex; align-items: center; gap: 6px; }
        .difficulty-dots { display: flex; gap: 4px; }
        .difficulty-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
        .difficulty-dot.filled { background: var(--mushikuri); }

        /* ── Exercise Styles ─────────────────────────────────── */
        .exercises { display: flex; flex-direction: column; gap: 16px; margin-top: 1.5rem; }
        .exercise-card {
            border: none;
            border-radius: var(--radius);
            padding: 20px 24px;
            background: var(--bg-card);
            box-shadow: var(--shadow-sm);
        }
        .exercise-header {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 12px;
            cursor: pointer;
            user-select: none;
        }
        .exercise-number {
            font-weight: 700;
            color: var(--kiku);
            font-size: 1.2rem;
            min-width: 30px;
        }
        .exercise-content { flex: 1; }
        .exercise-title { font-weight: 600; margin-bottom: 6px; font-size: 15px; }
        .exercise-hints {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-light);
        }
        .hint {
            margin-bottom: 12px;
            padding: 14px 18px;
            background: var(--kiku-bg);
            border-left: 3px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .hint-label {
            font-weight: 600;
            color: var(--kiku);
            font-size: 13px;
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .hint-text { font-size: 15px; color: var(--ink); line-height: 1.7; }

        .solution {
            margin-top: 14px;
            padding: 16px 18px;
            background: var(--kiku-light);
            border-left: 3px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .solution-label {
            font-weight: 600;
            color: var(--kiku);
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }
        .solution-text { font-size: 15px; color: var(--ink); line-height: 1.7; }

        /* ── Theory Card ────────────────────────────────────── */
        .theory-card {
            background: var(--bg-card);
            border: none;
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }
        .theory-title {
            font-family: var(--serif);
            font-size: clamp(18px, 2.5vw, 22px);
            font-weight: 400;
            margin-bottom: 16px;
        }
        .theory-content { line-height: 1.8; color: var(--ink); }
        .theory-content p { margin-bottom: 14px; }
        .theory-content ul, .theory-content ol { margin-left: 1.5rem; line-height: 1.8; }

        .key-insight {
            margin: 20px 0;
            padding: 16px 20px;
            background: var(--kiku-bg);
            border-left: 4px solid var(--kiku);
            border-radius: 0 var(--radius-xs) var(--radius-xs) 0;
        }
        .key-insight-title {
            font-weight: 700;
            color: var(--kiku);
            margin-bottom: 6px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        /* ── Utility ────────────────────────────────────────── */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 2rem; }
        .mb-1 { margin-bottom: 1rem; }
        .mb-2 { margin-bottom: 2rem; }

        .expand-icon { transition: transform .3s ease; color: var(--ink-muted); }
        .expand-icon.collapsed { transform: rotate(0deg); }
        .expand-icon.expanded { transform: rotate(180deg); }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 700px) {
            main { padding: 1.25rem; }
            .tutor-header { padding: 14px 1rem; }
            .tutor-header h1 { font-size: 16px; }
            .quiz-results { grid-template-columns: 1fr; }
            .topic-stats { flex-direction: column; gap: 8px; }
        }
    </style>

    <script>
        // ============= DATA =============
        const QUIZ_DATA = {
            questions: [
                {
                    id: 1,
                    topic: "Funktionenscharen",
                    text: "Eine Funktionenschar ist gegeben durch \\( f_a(x) = x^2 - 2ax + 1 \\). Für welchen Wert von \\( a \\) ist die Diskriminante der quadratischen Gleichung \\( f_a(x) = 0 \\) gleich Null?",

        const LEARNING_MODULES = {
            "Funktionenscharen": {

            });

            const isLast = (index === QUIZ_DATA.questions.length - 1);
            document.getElementById('next-btn').textContent = isLast ? 'Quiz auswerten →' : 'Weiter →';

            if (appState.answers[index] !== undefined) {
                document.querySelectorAll('.quiz-option').forEach((opt, idx) => {
                    if (idx === appState.answers[index]) {
                        opt.classList.add('selected');
                    }
                });
                document.getElementById('next-btn').style.display = 'inline-block';
            } else {
                document.getElementById('next-btn').style.display = 'none';
            }

            document.getElementById('next-btn').onclick = () => nextQuestion();

            safeTypeset();
        }

        function nextQuestion() {
            if (appState.currentQuestion < QUIZ_DATA.questions.length - 1) {
                appState.currentQuestion++;
                showQuestion(appState.currentQuestion);
            } else {
                completeQuiz();
            }
        }

        function completeQuiz() {
            appState.quizComplete = true;
            calculateResults();
            saveToLocalStorage();
            showResultsPhase();
        }

        function calculateResults() {
            appState.results = {};
            const topicCounts = {};
            const topicCorrect = {};

            QUIZ_DATA.questions.forEach((question, index) => {
                const topic = question.topic;
                if (!topicCounts[topic]) {
                    topicCounts[topic] = 0;
                    topicCorrect[topic] = 0;
                }
                topicCounts[topic]++;
                if (appState.answers[index] === question.correct) {
                    topicCorrect[topic]++;
                }
            });

            Object.keys(topicCounts).forEach(topic => {
                const correct = topicCorrect[topic];
                const total = topicCounts[topic];
                const percentage = (correct / total) * 100;

                if (percentage >= 80) {
                    appState.results[topic] = 'mastered';
                } else if (percentage >= 50) {
                    appState.results[topic] = 'unsure';
                } else {
                    appState.results[topic] = 'needs-practice';
                }
            });
        }

        function showResultsPhase() {
            document.getElementById('quiz-phase').classList.add('hidden');
            document.getElementById('results-phase').classList.remove('hidden');
            document.getElementById('learning-phase').classList.add('hidden');

            const grid = document.getElementById('results-grid');
            grid.innerHTML = '';

            Object.keys(appState.results).forEach(topic => {
                const status = appState.results[topic];
                const card = document.createElement('div');
                card.className = `result-card ${status}`;

                let icon = '✓';
                let statusText = 'Geschafft';
                if (status === 'unsure') {
                    icon = '⚠';
                    statusText = 'Unsicher';
                } else if (status === 'needs-practice') {
                    icon = '✗';
                    statusText = 'Üben nötig';
                }

                card.innerHTML = `
                    <div class="result-icon">${icon}</div>
                    <div class="result-card-title">${topic}</div>
                    <div class="result-card-status">${statusText}</div>
                `;
                grid.appendChild(card);
            });

            safeTypeset();
        }

        // ============= LEARNING PHASE =============
        function showLearningPhase() {
            document.getElementById('quiz-phase').classList.add('hidden');
            document.getElementById('results-phase').classList.add('hidden');
            document.getElementById('learning-phase').classList.remove('hidden');
            document.getElementById('module-phase').classList.add('hidden');

            appState.currentPhase = 'learning';
            renderLearningPath();
            updateLearningProgress();
        }

        function renderLearningPath() {
            const container = document.getElementById('learning-path-container');
            container.innerHTML = '';

            const topicOrder = [
                "Funktionenscharen",
                "Extremalprobleme",
                "Steckbriefaufgaben",
                "Sachkontexte der Analysis"
            ];

            topicOrder.forEach((topic, index) => {
                const status = appState.results[topic];
                const meta = TOPIC_DATA[topic];
                const isCompleted = status === 'mastered';

                const card = document.createElement('div');
                card.className = 'topic-card';

                const headerClass = isCompleted ? 'collapsed' : '';
                const contentClass = isCompleted ? 'hidden' : '';

                const statusIcon = status === 'mastered' ? '✓' : status === 'unsure' ? '⚠' : '✗';
                const statusClass = status === 'mastered' ? 'green' : status === 'unsure' ? 'amber' : 'red';
                const expandIcon = isCompleted ? '▼' : '▲';

                card.innerHTML = `
                    <div class="topic-card-header ${headerClass}">
                        <div class="card-icon ${statusClass}" style="width: 50px; height: 50px; font-size: 1.75rem;">${statusIcon}</div>
                        <div class="topic-meta">
                            <div class="card-title">${topic}</div>
                            <div class="card-subtitle">${meta.description}</div>
                            <div class="topic-stats">
                                <div class="topic-stat">
                                    <span>⏱</span>
                                    <span>${meta.estimatedTime}</span>
                                </div>
                                <div class="topic-stat">
                                    <span>Schwierigkeit:</span>
                                    <div class="difficulty-dots">
                                        ${Array(3).fill(0).map((_, i) => `<div class="difficulty-dot ${i < meta.difficulty ? 'filled' : ''}"></div>`).join('')}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div style="font-size: 1.5rem; transition: transform 0.3s;" class="expand-icon">${expandIcon}</div>
                    </div>
                    <div class="topic-card-content ${contentClass}" style="max-height: ${isCompleted ? '0' : '1000px'};">
                        ${isCompleted ? '' : `<button class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Thema starten →</button>`}
                    </div>
                `;

                const header = card.querySelector('.topic-card-header');
                const content = card.querySelector('.topic-card-content');
                const expandIconEl = card.querySelector('.expand-icon');

                header.addEventListener('click', () => {
                    const isExpanded = !content.classList.contains('hidden');
                    if (isExpanded) {
                        content.classList.add('hidden');
                        header.classList.add('collapsed');
                        expandIconEl.textContent = '▼';
                    } else {
                        content.classList.remove('hidden');
                        header.classList.remove('collapsed');
                        expandIconEl.textContent = '▲';
                    }
                });

                const startBtn = card.querySelector('.btn-primary');
                if (startBtn) {
                    startBtn.addEventListener('click', () => {
                        startModule(topic);
                    });
                }

                container.appendChild(card);
            });
        }

        function updateLearningProgress() {
            const completed = Object.values(appState.results).filter(r => r === 'mastered').length;
            const total = Object.keys(appState.results).length;
            const percentage = (completed / total) * 100;
            document.getElementById('learning-progress').style.width = percentage + '%';
        }

        // ============= MODULE PHASE =============
        function startModule(topic) {
            appState.currentModule = topic;
            appState.currentPhase = 'module';
            document.getElementById('quiz-phase').classList.add('hidden');
            document.getElementById('results-phase').classList.add('hidden');
            document.getElementById('learning-phase').classList.add('hidden');
            document.getElementById('module-phase').classList.remove('hidden');

            renderModule(topic);
        }

        function renderModule(topic) {
            const module = LEARNING_MODULES[topic];
            const container = document.getElementById('module-content');

            let html = `
                <div class="module-container">
                    <div>
                        <h2 class="module-title">${topic}</h2>
                        ${module.theory}
                    </div>

                    <div style="margin-top: 2rem;">
                        <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1.5rem;">Übungen</h3>
            `;

            module.exercises.forEach((exercise, index) => {
                const difficultyColor = exercise.difficulty === 'Leicht' ? '#1a7a3c' : exercise.difficulty === 'Mittel' ? '#b45309' : '#b91c1c';

                html += `
                    <div class="exercise-item" onclick="toggleExerciseExpansion(this)">
                        <div class="exercise-header">
                            <div style="flex: 1;">
                                <div class="exercise-title">${exercise.title}</div>
                                <div style="color: var(--ink-soft); margin-top: 0.25rem; font-size: 0.85rem;">${exercise.text}</div>
                                <div class="exercise-difficulty" style="background-color: ${difficultyColor}; color: white; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">
                                    ${exercise.difficulty}
                                </div>
                            </div>
                            <div style="font-size: 1.5rem; opacity: 0.5;">▼</div>
                        </div>
                        <div style="display: none; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border-light);">
                            <div class="exercise-hints">
                `;

                exercise.hints.forEach((hint, hintIndex) => {
                    html += `
                        <div class="hint">
                            <span class="hint-label">Tipp ${hintIndex + 1}:</span>
                            <div class="hint-text">${hint}</div>
                        </div>
                    `;
                });

                html += `
                                <div class="solution">
                                    <span class="solution-label">Lösung:</span>
                                    <div class="solution-text">${exercise.solution}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;

            container.innerHTML = html;
            safeTypeset();
        }

        function toggleExerciseExpansion(element) {
            const content = element.querySelector('div > div:last-child');
            const isVisible = content.style.display !== 'none';

            if (isVisible) {
                content.style.display = 'none';
                element.querySelector('.exercise-header div:last-child').style.transform = 'rotate(0deg)';
            } else {
                content.style.display = 'block';
                element.querySelector('.exercise-header div:last-child').style.transform = 'rotate(180deg)';
            }
        }

        function safeTypeset() {
            if (window.mathJaxReady) {
                MathJax.typesetPromise().catch(function(e) {
                    console.log(e);
                });
            } else {
                window._pendingTypeset = true;
            }
        }

        // ============= EVENT LISTENERS =============
        document.getElementById('retake-quiz-btn').addEventListener('click', () => {
            appState = {
                currentQuestion: 0,
                answers: [],
                quizComplete: false,
                results: {},
                currentPhase: 'quiz',
                currentModule: null,
                learningProgress: {}
            };
            saveToLocalStorage();
            showQuizPhase();
        });

        document.getElementById('restart-quiz-btn').addEventListener('click', () => {
            appState = {
                currentQuestion: 0,
                answers: [],
                quizComplete: false,
                results: {},
                currentPhase: 'quiz',
                currentModule: null,
                learningProgress: {}
            };
            saveToLocalStorage();
            showQuizPhase();
        });

        document.getElementById('back-to-path-btn').addEventListener('click', () => {
            showLearningPhase();
        });

        // Initialize on load
        window.addEventListener('load', () => {
            initializeApp();
        });
    </script>
</body>
</html>
